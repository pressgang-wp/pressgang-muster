name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer test

  wordpress-integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: muster_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      WP_VERSION: '7.0.1'
      WP_TEST_DB_NAME: muster_test
      WP_TEST_DB_USER: root
      WP_TEST_DB_PASSWORD: root
      WP_TEST_DB_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mysqli
          tools: composer:v2, wp-cli
      - run: bin/run-integration-tests.sh
